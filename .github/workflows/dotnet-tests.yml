name: Run .NET Tests

on:
  push:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: AspireChat

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x
          dotnet-quality: ga

      - name: Configure OpenSSL certificate directory
        shell: bash
        run: |
          openssl_cert_dir="$(openssl version -d | sed -E 's/^OPENSSLDIR: "(.*)"$/\1/')/certs"
          echo "SSL_CERT_DIR=$HOME/.aspnet/dev-certs/trust:${SSL_CERT_DIR:-$openssl_cert_dir}" >> "$GITHUB_ENV"

      - name: Trust ASP.NET Core development certificate
        run: dotnet dev-certs https --trust

      - name: Restore dependencies
        run: dotnet restore AspireChat.sln

      - name: Run tests
        run: dotnet test --solution AspireChat.sln --configuration Release --no-restore
